<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arman Qureshi - Interactive Portfolio</title>
<style>
/* Body and full-screen */
body, html{
  margin:0; padding:0;
  width:100%; height:100%;
  overflow:hidden;
  background:#0b0c1a;
  font-family: Arial, sans-serif;
  color:white;
}

/* Floating stars background */
.star{
  position:absolute;
  width:2px; height:2px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10px);}
  100%{transform:translateY(110vh);}
}

/* Header */
header{
  position:absolute; top:20px; width:100%;
  text-align:center;
  z-index:10;
}
header h1{
  font-size:48px;
  color:#60a5fa;
  text-shadow: 0 0 10px #60a5fa,0 0 20px #2563eb;
  animation:floatText 3s ease-in-out infinite alternate;
}
@keyframes floatText{
  from{transform:translateY(0);}
  to{transform:translateY(-15px);}
}

/* Buttons container */
.buttons{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  display:flex; flex-direction:column; gap:20px;
  z-index:10;
}

/* Social buttons */
.buttons a{
  padding:14px 30px;
  text-decoration:none;
  font-weight:bold;
  border-radius:12px;
  text-align:center;
  color:white;
  transition:0.3s;
  font-size:18px;
}
.buttons a.whatsapp{background:#25D366;}
.buttons a.instagram{background:#C13584;}
.buttons a.facebook{background:#3b5998;}
.buttons a.snapchat{background:#FFFC00; color:black;}
.buttons a.gmail{background:#D44638;}

.buttons a:hover{
  transform:scale(1.2) rotateY(15deg);
  box-shadow:0 0 20px rgba(255,255,255,0.5);
}

/* Gallery section */
.section{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}
.section h2{color:#60a5fa; margin-bottom:10px; font-size:28px;}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:15px;
  max-width:600px;
  margin:0 auto;
}
.gallery div{
  background:#1e293b;
  border-radius:12px;
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:20px;
  transition:0.3s;
}
.gallery div:hover{
  transform:scale(1.2);
  background:#2563eb;
  box-shadow:0 0 15px #60a5fa;
}
</style>
</head>
<body>

<header>
  <h1>Arman Qureshi</h1>
</header>

<div class="buttons">
  <a class="whatsapp" href="https://wa.me/919026550240">WhatsApp</a>
  <a class="instagram" href="https://www.instagram.com/armanqureshi2800">Instagram</a>
  <a class="facebook" href="https://www.facebook.com/share/19pPMX9SMV/">Facebook</a>
  <a class="snapchat" href="https://www.snapchat.com/add/armanqureshi_28">Snapchat</a>
  <a class="gmail" href="mailto:k4046280@gmail.com">Gmail</a>
</div>

<div class="section">
<h2>Gallery / Photos</h2>
<div class="gallery">
  <div>1</div><div>2</div><div>3</div>
  <div>4</div><div>5</div><div>6</div>
  <div>7</div><div>8</div><div>9</div>
  <div>10</div>
</div>
</div>

<script>
// Generate floating stars
const starCount=100;
for(let i=0;i<starCount;i++){
  const star=document.createElement('div');
  star.classList.add('star');
  star.style.left=Math.random()*100+'vw';
  star.style.top=Math.random()*100+'vh';
  star.style.width=star.style.height=Math.random()*3+1+'px';
  star.style.animationDuration=5+Math.random()*5+'s';
  document.body.appendChild(star);
}
</script>

</body>
</html>
